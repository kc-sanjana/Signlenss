# SignLens Application Configuration

# Server
server.port=8080
spring.application.name=signlens

# File upload limits (max 10MB for high-res sign images)
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Anthropic API Key
# Set via environment variable ANTHROPIC_API_KEY or here directly:
anthropic.api.key=${ANTHROPIC_API_KEY:}

# Logging
logging.level.com.signlens=INFO
logging.level.org.springframework.web=WARN
